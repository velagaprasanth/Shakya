name: Keep Supabase Alive

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest

    steps:
      - name: Ping Supabase
        run: |
          curl "${{ secrets.SUPABASE_URL }}/rest/v1/keepalive_ping?select=id&limit=1" \
          -H "apikey: ${{ secrets.SUPABASE_KEY }}"
